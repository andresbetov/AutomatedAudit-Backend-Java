spring:
  application:
    name: audit
  datasource:
    url: jdbc:postgresql://localhost:5432/audit
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
  jpa:

    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Multipart limits (adjust as needed)
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 120MB
# Tomcat swallow size (-1 = unlimited; helps with large bodies)
server:
  tomcat:
    max-swallow-size: -1
